name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    name: Test and typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm typecheck

      - name: Check diff hygiene
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          base="$BASE_SHA"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi
          git diff --check "$base...HEAD"

      - name: Scan added lines for obvious secrets
        env:
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          base="$BASE_SHA"
          if [ -z "$base" ] || ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            base="$(git rev-list --max-parents=0 HEAD)"
          fi
          diff_file="$(mktemp)"
          git diff --unified=0 --no-ext-diff "$base...HEAD" -- . ':!pnpm-lock.yaml' > "$diff_file"
          python3 - "$diff_file" <<'PY'
          import re
          import sys

          diff_path = sys.argv[1]
          patterns = [
              re.compile(r"AKIA[0-9A-Z]{16}"),
              re.compile(r"ghp_[A-Za-z0-9_]{30,}"),
              re.compile(r"github_pat_[A-Za-z0-9_]{30,}"),
              re.compile(r"-----BEGIN (?:RSA |OPENSSH |EC |DSA )?PRIVATE KEY-----"),
              re.compile(r"xox[baprs]-[A-Za-z0-9-]{20,}"),
              re.compile(r"sk-[A-Za-z0-9]{20,}"),
          ]

          findings = []
          current_file = None
          with open(diff_path, encoding="utf-8", errors="replace") as diff:
              for line in diff:
                  if line.startswith("+++ b/"):
                      current_file = line.removeprefix("+++ b/").strip()
                      continue
                  if not line.startswith("+") or line.startswith("+++"):
                      continue
                  added = line[1:].rstrip("\n")
                  for pattern in patterns:
                      if pattern.search(added):
                          findings.append((current_file or "<unknown>", pattern.pattern))

          if findings:
              print("Potential secret-like values found in added lines:", file=sys.stderr)
              for path, pattern in findings:
                  print(f"- {path}: matched {pattern}", file=sys.stderr)
              sys.exit(1)
          PY
